<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BankLite dashboard — view your accounts, balances and manage your finances."
    />
    <meta name="robots" content="index, follow" />
    <title>BankLite — Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="xfavicon.ico" type="image/x-icon" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="5" width="20" height="14" rx="3" />
            <line x1="2" y1="10" x2="22" y2="10" />
            <line x1="6" y1="15" x2="10" y2="15" />
            <circle cx="17" cy="15" r="1.5" fill="#fff" />
          </svg>
          <span>BankLite</span>
        </div>
        <nav class="sidebar-nav">
          <a href="dashboard.html" class="active">Dashboard</a>
          <a href="deposit.html">Deposit</a>
          <a href="withdraw.html">Withdraw</a>
          <a href="transfer.html">Transfer</a>
          <a href="transactions.html">Transactions</a>
        </nav>
        <button id="logout-btn">Logout</button>
      </aside>

      <main class="dashboard-main">
        <h1 class="dashboard-title">My Accounts</h1>
        <div
          id="error-msg"
          class="error-msg"
          role="alert"
          aria-live="polite"
        ></div>
        <div id="accounts-container"></div>

        <div
          class="form-card"
          id="create-account-section"
          style="display: none"
        >
          <h2 class="section-title">Create Account</h2>
          <div
            id="create-error-msg"
            class="error-msg"
            role="alert"
            aria-live="polite"
          ></div>
          <div
            id="create-success-msg"
            class="success-msg"
            role="status"
            aria-live="polite"
          ></div>
          <div class="form-group">
            <label for="account-type-select">Account Type</label>
            <select id="account-type-select">
              <option value="0">Chequing</option>
              <option value="1">Savings</option>
            </select>
          </div>
          <button id="create-account-btn">Create Account</button>
        </div>
      </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BankLite withdraw page — securely remove funds from your account with ease."
    />
    <meta name="robots" content="index, follow" />
    <title>BankLite — Withdraw</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="xfavicon.ico" type="image/x-icon" />
  </head>
  <body class="dashboard-body">
    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="5" width="20" height="14" rx="3" />
            <line x1="2" y1="10" x2="22" y2="10" />
            <line x1="6" y1="15" x2="10" y2="15" />
            <circle cx="17" cy="15" r="1.5" fill="#fff" />
          </svg>
          <span>BankLite</span>
        </div>
        <nav class="sidebar-nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="deposit.html">Deposit</a>
          <a href="withdraw.html" class="active">Withdraw</a>
          <a href="transfer.html">Transfer</a>
          <a href="transactions.html">Transactions</a>
        </nav>
        <button id="logout-btn">Logout</button>
      </aside>
      <main class="dashboard-main">
        <h1 class="dashboard-title">Withdraw Funds</h1>
        <div id="loading-msg" class="spinner"></div>
        <div id="empty-state" class="empty-state" style="display: none">
          <p>
            You have no accounts.
            <a href="dashboard.html">Create one on the dashboard.</a>
          </p>
        </div>
        <div class="form-card" style="display: none">
          <div
            id="error-msg"
            class="error-msg"
            role="alert"
            aria-live="polite"
          ></div>
          <div
            id="success-msg"
            class="success-msg"
            role="status"
            aria-live="polite"
          ></div>
          <div class="form-group">
            <label for="account-select">Select Account</label>
            <select id="account-select">
              <option value="">Loading accounts...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Current Balance</label>
            <p id="balance-display" class="balance-display">—</p>
          </div>
          <div class="form-group">
            <label for="amount">Amount</label>
            <input
              type="number"
              id="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
            />
          </div>
          <button id="withdraw-btn">Withdraw</button>
        </div>
      </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/withdraw.js"></script>
  </body>
</html>
